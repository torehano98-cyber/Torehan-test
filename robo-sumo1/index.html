<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактивный тест «Робо-сумо»</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.12);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 20px 45px rgba(0,0,0,0.35);
      --radius: 24px;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #1d4ed8 0%, transparent 30%),
        radial-gradient(circle at top right, #0ea5e9 0%, transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .container {
      width: min(980px, calc(100% - 32px));
      margin: 28px auto;
    }

    .hero {
      background: linear-gradient(135deg, rgba(56,189,248,0.18), rgba(34,197,94,0.12));
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .quiz-box {
      margin-top: 22px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .badge {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 700;
    }

    .progress-wrap {
      margin: 16px 0 24px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.35s ease;
    }

    .question-card {
      background: rgba(15,23,42,0.45);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 22px;
    }

    .question-number {
      font-size: 14px;
      color: #93c5fd;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .question-title {
      font-size: clamp(22px, 3.2vw, 30px);
      line-height: 1.25;
      margin: 0 0 20px;
    }

    .answers {
      display: grid;
      gap: 14px;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 16px 18px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .answer-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(56,189,248,0.7);
      background: rgba(56,189,248,0.12);
    }

    .answer-btn.selected {
      border-color: #38bdf8;
      background: rgba(56,189,248,0.18);
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    button.nav-btn {
      border: none;
      padding: 14px 22px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button.nav-btn:hover { transform: translateY(-2px); }
    button.nav-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: #082f49;
    }

    .message {
      margin-top: 14px;
      min-height: 24px;
      font-weight: 700;
      color: #fde68a;
    }

    .result-screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(34,197,94,0.25), transparent 30%),
        linear-gradient(135deg, #020617, #0f172a, #1e293b);
      z-index: 1000;
    }

    .result-screen.show {
      display: flex;
    }

    .result-card {
      width: min(900px, 100%);
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 32px;
      padding: 34px 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      animation: popIn 0.45s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.94); }
      to { opacity: 1; transform: scale(1); }
    }

    .result-card h2 {
      font-size: clamp(34px, 6vw, 64px);
      margin: 0 0 12px;
    }

    .score {
      font-size: clamp(44px, 10vw, 100px);
      font-weight: 900;
      margin: 10px 0;
      color: #67e8f9;
    }

    .result-text {
      font-size: clamp(18px, 2.5vw, 28px);
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .result-comment {
      font-size: clamp(22px, 3.5vw, 36px);
      font-weight: 800;
      margin: 16px 0 28px;
      color: #fef08a;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .result-actions button {
      border: none;
      border-radius: 18px;
      padding: 16px 26px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .restart-btn {
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: #082f49;
    }

    .close-btn {
      background: rgba(255,255,255,0.14);
      color: white;
    }

    @media (max-width: 640px) {
      .quiz-box, .hero, .question-card { padding: 18px; }
      .answer-btn { font-size: 16px; }
      button.nav-btn { width: 100%; }
      .controls { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>🤖 Интерактивный тест «Робо-сумо»</h1>
      <p>Ответь на 15 вопросов и узнай свой результат в конце.</p>
    </section>

    <section class="quiz-box">
      <div class="top-row">
        <div class="badge" id="questionCounter">Вопрос 1 из 15</div>
        <div class="badge" id="scoreCounter">Баллы: 0</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-text">
          <span>Прогресс</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-number">Тест по робототехнике</div>
        <h2 class="question-title" id="questionTitle"></h2>
        <div class="answers" id="answersBox"></div>
        <div class="message" id="messageBox"></div>
      </div>

      <div class="controls">
        <button class="nav-btn btn-secondary" id="prevBtn">← Назад</button>
        <button class="nav-btn btn-primary" id="nextBtn">Далее →</button>
      </div>
    </section>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-card">
      <h2>🏆 Тест завершён!</h2>
      <div class="score" id="finalScore">0 / 15</div>
      <div class="result-text" id="resultText"></div>
      <div class="result-comment" id="resultComment"></div>
      <div class="result-actions">
        <button class="restart-btn" id="restartBtn">Пройти заново</button>
        <button class="close-btn" id="closeResultBtn">Закрыть результат</button>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: 'Что такое робо-сумо?',
        answers: [
          'Гонка роботов по трассе',
          'Соревнование роботов, где нужно вытолкнуть соперника из круга',
          'Роботы собирают предметы',
          'Роботы рисуют линии'
        ],
        correct: 1
      },
      {
        question: 'Где проходит соревнование робо-сумо?',
        answers: [
          'На квадратной площадке',
          'На круглой арене',
          'На длинной дороге',
          'На шахматной доске'
        ],
        correct: 1
      },
      {
        question: 'Что должен сделать робот, чтобы победить?',
        answers: [
          'Доехать до финиша',
          'Собрать больше предметов',
          'Вытолкнуть соперника за пределы круга',
          'Сделать больше кругов'
        ],
        correct: 2
      },
      {
        question: 'Что происходит, если робот выехал за пределы арены?',
        answers: [
          'Он проигрывает',
          'Он получает бонус',
          'Игра продолжается',
          'Он выигрывает'
        ],
        correct: 0
      },
      {
        question: 'Какая линия обычно обозначает границу арены?',
        answers: [
          'Красная линия',
          'Синяя линия',
          'Черная линия',
          'Зеленая линия'
        ],
        correct: 2
      },
      {
        question: 'Какой датчик помогает роботу увидеть границу арены?',
        answers: [
          'Датчик цвета',
          'Датчик температуры',
          'Датчик звука',
          'Датчик наклона'
        ],
        correct: 0
      },
      {
        question: 'Какой датчик помогает роботу обнаружить соперника?',
        answers: [
          'Датчик света',
          'Ультразвуковой датчик расстояния',
          'Датчик температуры',
          'Датчик влажности'
        ],
        correct: 1
      },
      {
        question: 'Что должен сделать робот, если увидел черную линию?',
        answers: [
          'Ускориться',
          'Остановиться или отъехать назад',
          'Ничего не делать',
          'Выключиться'
        ],
        correct: 1
      },
      {
        question: 'Что делает робот, если обнаружил соперника?',
        answers: [
          'Уезжает',
          'Останавливается',
          'Едет вперёд и пытается вытолкнуть',
          'Крутится на месте'
        ],
        correct: 2
      },
      {
        question: 'Какая главная задача программиста робота?',
        answers: [
          'Сделать робота красивым',
          'Написать программу, чтобы робот находил соперника и не выезжал за границу',
          'Сделать робота большим',
          'Сделать робота медленным'
        ],
        correct: 1
      },
      {
        question: 'Сколько роботов обычно участвуют в одном поединке робо-сумо?',
        answers: [
          'Один',
          'Два',
          'Три',
          'Четыре'
        ],
        correct: 1
      },
      {
        question: 'Где обычно начинается бой робо-сумо?',
        answers: [
          'В центре арены',
          'За пределами круга',
          'В углу арены',
          'У линии границы'
        ],
        correct: 0
      },
      {
        question: 'Почему роботу важно уметь находить соперника?',
        answers: [
          'Чтобы фотографировать его',
          'Чтобы избежать столкновения',
          'Чтобы атаковать и вытолкнуть из круга',
          'Чтобы остановиться'
        ],
        correct: 2
      },
      {
        question: 'Что может помочь роботу быстрее найти соперника?',
        answers: [
          'Двигаться и вращаться в поиске объекта',
          'Стоять на месте',
          'Выключить датчики',
          'Двигаться очень медленно'
        ],
        correct: 0
      },
      {
        question: 'Что делает алгоритм робота в робо-сумо?',
        answers: [
          'Украшает робота',
          'Управляет действиями робота во время боя',
          'Делает робота тяжелее',
          'Заряжает батарею'
        ],
        correct: 1
      }
    ];

    let currentQuestion = 0;
    let userAnswers = new Array(questions.length).fill(null);

    const questionTitle = document.getElementById('questionTitle');
    const answersBox = document.getElementById('answersBox');
    const questionCounter = document.getElementById('questionCounter');
    const scoreCounter = document.getElementById('scoreCounter');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const messageBox = document.getElementById('messageBox');
    const resultScreen = document.getElementById('resultScreen');
    const finalScore = document.getElementById('finalScore');
    const resultText = document.getElementById('resultText');
    const resultComment = document.getElementById('resultComment');
    const restartBtn = document.getElementById('restartBtn');
    const closeResultBtn = document.getElementById('closeResultBtn');

    function getScore() {
      return userAnswers.reduce((score, answer, index) => {
        return score + (answer === questions[index].correct ? 1 : 0);
      }, 0);
    }

    function answeredCount() {
      return userAnswers.filter(answer => answer !== null).length;
    }

    function updateProgress() {
      const percent = Math.round((answeredCount() / questions.length) * 100);
      progressFill.style.width = percent + '%';
      progressPercent.textContent = percent + '%';
      scoreCounter.textContent = 'Баллы: ' + getScore();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      questionTitle.textContent = q.question;
      questionCounter.textContent = `Вопрос ${currentQuestion + 1} из ${questions.length}`;
      answersBox.innerHTML = '';
      messageBox.textContent = '';

      q.answers.forEach((answer, index) => {
        const button = document.createElement('button');
        button.className = 'answer-btn';
        button.textContent = String.fromCharCode(65 + index) + ') ' + answer;

        if (userAnswers[currentQuestion] === index) {
          button.classList.add('selected');
        }

        button.addEventListener('click', () => {
          userAnswers[currentQuestion] = index;
          renderQuestion();
          updateProgress();
        });

        answersBox.appendChild(button);
      });

      prevBtn.disabled = currentQuestion === 0;
      nextBtn.textContent = currentQuestion === questions.length - 1 ? 'Завершить тест' : 'Далее →';
      updateProgress();
    }

    function showResult() {
      const score = getScore();
      finalScore.textContent = `${score} / ${questions.length}`;
      resultText.textContent = `Ты правильно ответил(а) на ${score} из ${questions.length} вопросов.`;

      let comment = '';
      if (score === 15) {
        comment = '🔥 Отлично! Ты настоящий чемпион робо-сумо!';
      } else if (score >= 12) {
        comment = '🚀 Очень хороший результат! Ты отлично понял тему.';
      } else if (score >= 8) {
        comment = '👍 Хорошо! Но кое-что можно ещё повторить.';
      } else if (score >= 5) {
        comment = '🙂 Неплохо, но стоит ещё потренироваться.';
      } else {
        comment = '🤖 Нужно ещё немного повторить правила робо-сумо.';
      }

      resultComment.textContent = comment;
      resultScreen.classList.add('show');
    }

    nextBtn.addEventListener('click', () => {
      if (userAnswers[currentQuestion] === null) {
        messageBox.textContent = 'Сначала выбери один вариант ответа.';
        return;
      }

      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        showResult();
      }
    });

    prevBtn.addEventListener('click', () => {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    });

    restartBtn.addEventListener('click', () => {
      currentQuestion = 0;
      userAnswers = new Array(questions.length).fill(null);
      resultScreen.classList.remove('show');
      renderQuestion();
    });

    closeResultBtn.addEventListener('click', () => {
      resultScreen.classList.remove('show');
    });

    renderQuestion();
  </script>
</body>
</html>
