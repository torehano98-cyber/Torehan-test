<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Космическое деление на группы</title>
  <style>
    :root{
      --bg1:#070A1A;
      --bg2:#0B1030;
      --stroke:#23306b;
      --text:#eaf0ff;
      --muted:#9fb0ff;
      --accent:#79c0ff;
      --shadow: 0 18px 50px rgba(0,0,0,.55);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color:var(--text);
      overflow:hidden;
      background: radial-gradient(1200px 800px at 30% 20%, #1a2a6c22 0%, transparent 60%),
                  radial-gradient(900px 700px at 80% 30%, #b21f1f18 0%, transparent 55%),
                  radial-gradient(900px 700px at 65% 85%, #fdbb2d12 0%, transparent 55%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    /* stars */
    .stars,.stars2,.stars3{
      position:absolute; inset:0;
      background-repeat:repeat;
      pointer-events:none;
      opacity:.9;
    }
    .stars{
      background-image:
        radial-gradient(2px 2px at 20px 30px, #ffffffcc 40%, transparent 45%),
        radial-gradient(1px 1px at 90px 110px, #ffffffaa 40%, transparent 45%),
        radial-gradient(1px 1px at 140px 70px, #ffffffaa 40%, transparent 45%),
        radial-gradient(2px 2px at 220px 160px, #ffffffcc 40%, transparent 45%),
        radial-gradient(1px 1px at 310px 40px, #ffffffaa 40%, transparent 45%),
        radial-gradient(1px 1px at 380px 180px, #ffffffaa 40%, transparent 45%);
      background-size: 420px 220px;
      animation: drift 90s linear infinite;
    }
    .stars2{
      background-image:
        radial-gradient(1px 1px at 25px 45px, #b7c6ffcc 40%, transparent 45%),
        radial-gradient(1px 1px at 120px 160px, #d9e1ffbb 40%, transparent 45%),
        radial-gradient(1px 1px at 230px 95px, #b7c6ffbb 40%, transparent 45%),
        radial-gradient(1px 1px at 360px 30px, #d9e1ffbb 40%, transparent 45%),
        radial-gradient(1px 1px at 410px 190px, #b7c6ffbb 40%, transparent 45%);
      background-size: 520px 260px;
      opacity:.6;
      animation: drift 140s linear infinite reverse;
    }
    .stars3{
      background-image:
        radial-gradient(1px 1px at 50px 80px, #ffffff88 40%, transparent 45%),
        radial-gradient(1px 1px at 170px 20px, #ffffff88 40%, transparent 45%),
        radial-gradient(1px 1px at 260px 150px, #ffffff88 40%, transparent 45%),
        radial-gradient(1px 1px at 470px 110px, #ffffff88 40%, transparent 45%);
      background-size: 620px 320px;
      opacity:.35;
      animation: drift 200s linear infinite;
    }
    @keyframes drift{
      from{ transform: translate3d(0,0,0); }
      to{ transform: translate3d(-400px, 260px, 0); }
    }

    /* UI layout */
    .wrap{
      position:relative;
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:14px;
      padding:18px;
      z-index:2; /* UI above background */
      pointer-events:auto;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background: linear-gradient(180deg, #0c1438cc, #0b1231aa);
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px 16px;
      backdrop-filter: blur(10px);
    }
    .title{display:flex;flex-direction:column;gap:2px;min-width:260px}
    .title h1{margin:0;font-size:18px;letter-spacing:.3px}
    .title p{margin:0;color:var(--muted);font-size:13px}

    .controls{display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:10px}
    .ctrl{
      display:flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:14px;border:1px solid #22306a;background:#0b1231aa;
    }
    .ctrl label{font-size:13px;color:var(--muted);user-select:none}
    select,button{
      font: inherit;border-radius:12px;border:1px solid #2a3a7a;
      background:#0a1230;color:var(--text);padding:8px 10px;outline:none;
    }
    select:focus,button:focus{box-shadow:0 0 0 3px rgba(121,192,255,.18)}
    button{
      cursor:pointer;transition:transform .08s ease, box-shadow .2s ease, background .2s ease;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    button:hover{transform:translateY(-1px)}
    button:active{transform:translateY(0px) scale(.99)}
    .btn-primary{
      background: linear-gradient(180deg, #12256a, #0b173f);
      border-color:#3b62ff66;
    }
    .btn-ghost{background:#0b1231aa}

    main{
      display:grid;
      grid-template-columns: 1fr .9fr;
      gap:14px;
      min-height:0;
    }

    .space{
      border-radius: var(--radius);
      border:1px solid var(--stroke);
      background: radial-gradient(900px 600px at 40% 40%, #2a3cff1a 0%, transparent 55%),
                  linear-gradient(180deg, #0a102b66, #060a1a66);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      min-height:0;
    }
    .space .hint{
      position:absolute;left:14px;top:12px;
      display:flex;gap:10px;align-items:center;
      z-index:2;color:var(--muted);font-size:13px;user-select:none;
    }
    .pill{
      padding:5px 10px;border:1px solid #2a3a7a;background:#0b1231aa;border-radius:999px;
    }

    .panel{
      border-radius: var(--radius);
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, #0c1438cc, #0b1231aa);
      box-shadow: var(--shadow);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .panel-head{
      padding:12px 14px;border-bottom:1px solid #22306a;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .panel-head .left{display:flex;flex-direction:column;gap:2px}
    .panel-head .left b{font-size:14px}
    .panel-head .left span{font-size:12px;color:var(--muted)}
    .badge{
      padding:6px 10px;border-radius:999px;border:1px solid #2a3a7a;background:#0b1231aa;
      font-size:12px;color:var(--muted);user-select:none;
    }

    .groups{
      padding:12px;overflow:auto;display:grid;gap:12px;grid-template-columns:1fr;min-height:0;
    }
    .group{
      border:1px solid #27367a;
      background: radial-gradient(500px 200px at 20% 20%, rgba(121,192,255,.15), transparent 60%),
                  linear-gradient(180deg, rgba(10,18,48,.6), rgba(6,10,26,.55));
      border-radius:16px;padding:10px;min-height:104px;position:relative;overflow:hidden;
    }
    .group::before{
      content:"";
      position:absolute;width:180px;height:180px;right:-90px;top:-90px;
      background: radial-gradient(circle at 30% 30%, rgba(100,255,218,.18), transparent 60%);
      filter: blur(4px);
    }
    .group h3{margin:0 0 8px 0;font-size:13px;letter-spacing:.8px}
    .dock{display:flex;flex-wrap:wrap;gap:8px}

    .chip{
      display:flex;align-items:center;gap:8px;
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(121,192,255,.30);
      background: rgba(12,20,56,.55);
      font-weight:600;font-size:12px;
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
      user-select:none;
    }
    .chip .mini{font-size:14px}
    .chip .n{color:var(--accent);font-weight:800}

    footer{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      color:var(--muted);font-size:12px;padding:0 4px;user-select:none;
      z-index:2;
    }

    /* ==== FULL-PAGE FLYING LAYER ==== */
    .fly-layer{
      position:fixed;
      inset:0;
      z-index:1; /* behind UI (wrap z-index:2) */
      pointer-events:none; /* clicks go to UI */
    }

    .astro{
      position:fixed; /* FULL PAGE */
      width:58px;height:58px;
      display:grid;place-items:center;
      border-radius:18px;
      border:1px solid rgba(121,192,255,.35);
      background: linear-gradient(180deg, rgba(12,20,56,.78), rgba(6,10,26,.65));
      box-shadow: 0 10px 26px rgba(0,0,0,.45);
      backdrop-filter: blur(6px);
      will-change: transform;
      user-select:none;
    }
    .astro::after{
      content:"";
      position:absolute; inset:-12px;
      border-radius:26px;
      background: radial-gradient(60px 60px at 50% 20%, rgba(121,192,255,.22), transparent 60%);
      filter: blur(8px);
      z-index:-1;
    }
    .astro .emoji{
      font-size:24px;line-height:1;transform:translateY(-2px);
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.5));
    }
    .astro .num{
      position:absolute;bottom:8px;right:8px;
      min-width:24px;height:20px;padding:0 6px;border-radius:999px;
      display:grid;place-items:center;font-weight:700;font-size:12px;color:#061022;
      background: linear-gradient(180deg, #a7d8ff, #79c0ff);
      border:1px solid rgba(255,255,255,.35);
      box-shadow: 0 8px 16px rgba(0,0,0,.35);
    }

    @media (max-width: 980px){
      body{overflow:auto}
      .wrap{height:auto;min-height:100%}
      main{grid-template-columns:1fr}
      .space{height:520px}
      .fly-layer{position:absolute; height:100%;} /* fallback */
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <!-- full page flying layer -->
  <div class="fly-layer" id="flyLayer"></div>

  <div class="wrap">
    <header>
      <div class="title">
        <h1>🚀 Космическое деление на группы</h1>
        <p>Космонавты летают по всей странице и очень медленно улетают в свои отряды.</p>
      </div>

      <div class="controls">
        <div class="ctrl">
          <label for="groupsCount">Групп:</label>
          <select id="groupsCount">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
          </select>
        </div>

        <button class="btn-primary" id="btnSplit">Разделить 🚀</button>
        <button class="btn-ghost" id="btnShuffle">Перемешать 🔁</button>
        <button class="btn-ghost" id="btnReset">Сброс ✨</button>
      </div>
    </header>

    <main>
      <section class="space">
        <div class="hint">
          <span class="pill">Летают по всей странице</span>
          <span class="pill">В группы — очень медленно</span>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <div class="left">
            <b>Группы</b>
            <span>SIRIUS • ORION • SPUTNIK • VOYAGER</span>
          </div>
          <div class="badge" id="statusBadge">Готово</div>
        </div>
        <div class="groups" id="groups"></div>
      </aside>
    </main>

    <footer>
      <div>GitHub Pages: загрузите <b>index.html</b> → Settings → Pages.</div>
      <div>© Space Splitter</div>
    </footer>
  </div>

  <script>
    const TOTAL = 35;
    const GROUP_NAMES = ["SIRIUS","ORION","SPUTNIK","VOYAGER"];
    const EMOJI = "🧑‍🚀";

    const flyLayer = document.getElementById("flyLayer");
    const groupsWrap = document.getElementById("groups");
    const groupsCountSelect = document.getElementById("groupsCount");
    const badge = document.getElementById("statusBadge");

    const btnSplit = document.getElementById("btnSplit");
    const btnShuffle = document.getElementById("btnShuffle");
    const btnReset = document.getElementById("btnReset");

    // --- motion constants ---
    const SIZE = 58;
    const EDGE_PAD = 10;

    const rand = (min,max)=>Math.random()*(max-min)+min;
    const clamp = (v,min,max)=>Math.max(min,Math.min(max,v));

    let assigned = false;
    let rafId = null;
    let lastT = 0;

    // Each item: {el, x, y, vx, vy, mode, tx, ty, start, dur}
    let astronauts = [];

    function setBadge(t){ badge.textContent = t; }

    function createGroupsUI(k){
      groupsWrap.innerHTML = "";
      for(let i=0;i<k;i++){
        const g = document.createElement("div");
        g.className = "group";
        const title = document.createElement("h3");
        title.textContent = GROUP_NAMES[i];
        const dock = document.createElement("div");
        dock.className = "dock";
        dock.id = `dock-${i}`;
        g.appendChild(title);
        g.appendChild(dock);
        groupsWrap.appendChild(g);
      }
    }

    function clearAstronauts(){
      flyLayer.innerHTML = "";
      astronauts = [];
    }

    function viewportBounds(){
      const w = window.innerWidth;
      const h = window.innerHeight;
      return {
        minX: EDGE_PAD,
        minY: EDGE_PAD,
        maxX: w - SIZE - EDGE_PAD,
        maxY: h - SIZE - EDGE_PAD
      };
    }

    function spawnAstronauts(){
      clearAstronauts();
      const b = viewportBounds();

      for(let n=1;n<=TOTAL;n++){
        const el = document.createElement("div");
        el.className = "astro";
        el.dataset.num = String(n);
        el.innerHTML = `<div class="emoji">${EMOJI}</div><div class="num">${n}</div>`;
        flyLayer.appendChild(el);

        const x = rand(b.minX, Math.max(b.minX, b.maxX));
        const y = rand(b.minY, Math.max(b.minY, b.maxY));

        // slow drift by default
        const vx = rand(-18, 18);
        const vy = rand(-18, 18);

        astronauts.push({
          el, x, y, vx, vy,
          mode: "drift", // or "toTarget"
          tx: x, ty: y,
          start: 0, dur: 0
        });

        el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      }

      assigned = false;
      setBadge("Готово");
      startLoop();
    }

    function startLoop(){
      stopLoop();
      lastT = performance.now();
      function tick(t){
        const dt = Math.min(0.033, (t - lastT)/1000);
        lastT = t;

        const b = viewportBounds();

        for(const a of astronauts){
          if(a.mode === "drift" && !assigned){
            // gentle steering
            a.vx += rand(-3.0, 3.0) * dt;
            a.vy += rand(-3.0, 3.0) * dt;

            // speed limit (slow, smooth)
            const speed = Math.hypot(a.vx, a.vy);
            const maxSpeed = 22; // px/s
            if(speed > maxSpeed){
              a.vx = a.vx / speed * maxSpeed;
              a.vy = a.vy / speed * maxSpeed;
            }

            a.x += a.vx * dt;
            a.y += a.vy * dt;

            // soft bounce
            if(a.x < b.minX){ a.x = b.minX; a.vx = Math.abs(a.vx) * 0.95; }
            if(a.y < b.minY){ a.y = b.minY; a.vy = Math.abs(a.vy) * 0.95; }
            if(a.x > b.maxX){ a.x = b.maxX; a.vx = -Math.abs(a.vx) * 0.95; }
            if(a.y > b.maxY){ a.y = b.maxY; a.vy = -Math.abs(a.vy) * 0.95; }

            const rot = clamp(a.vx * 0.35, -8, 8);
            a.el.style.transform = `translate3d(${a.x}px, ${a.y}px, 0) rotate(${rot}deg)`;
          }

          if(a.mode === "toTarget"){
            // ultra smooth (ease in-out) — very slow flight
            const p = clamp((t - a.start) / a.dur, 0, 1);
            const ease = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;

            const x = a.x0 + (a.tx - a.x0) * ease;
            const y = a.y0 + (a.ty - a.y0) * ease;

            const rot = clamp((a.tx - a.x0) * 0.02, -12, 12);
            a.el.style.transform = `translate3d(${x}px, ${y}px, 0) rotate(${rot}deg)`;

            if(p >= 1){
              // hide astronaut when arrived (chips already show in group)
              a.el.style.opacity = "0.0";
              a.mode = "arrived";
            }
          }
        }

        rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }

    function stopLoop(){
      if(rafId) cancelAnimationFrame(rafId);
      rafId = null;
    }

    function shuffleAstronauts(){
      if(assigned){
        spawnAstronauts();
        return;
      }
      setBadge("Перемешиваю...");
      const b = viewportBounds();
      for(const a of astronauts){
        a.x = rand(b.minX, Math.max(b.minX, b.maxX));
        a.y = rand(b.minY, Math.max(b.minY, b.maxY));
        a.vx = rand(-18,18);
        a.vy = rand(-18,18);
        a.el.style.opacity = "1";
      }
      setTimeout(()=>setBadge("Готово"), 500);
    }

    function splitIntoGroups(){
      const k = parseInt(groupsCountSelect.value,10);
      createGroupsUI(k);

      // permutation 1..TOTAL
      const nums = Array.from({length: TOTAL}, (_,i)=>i+1);
      for(let i=nums.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [nums[i],nums[j]] = [nums[j],nums[i]];
      }

      // balanced groups
      const groups = Array.from({length:k}, ()=>[]);
      nums.forEach((num, idx)=> groups[idx % k].push(num));

      // render chips
      groups.forEach((arr, gi)=>{
        const dock = document.getElementById(`dock-${gi}`);
        dock.innerHTML = "";
        arr.sort((a,b)=>a-b).forEach(num=>{
          const chip = document.createElement("div");
          chip.className = "chip";
          chip.innerHTML = `<span class="mini">${EMOJI}</span> <span>№ <span class="n">${num}</span></span>`;
          dock.appendChild(chip);
        });
      });

      // map target centers (page coords)
      const targetPoint = new Map();
      groups.forEach((arr, gi)=>{
        const dock = document.getElementById(`dock-${gi}`);
        Array.from(dock.children).forEach(ch=>{
          const num = ch.querySelector(".n").textContent.trim();
          const r = ch.getBoundingClientRect();
          // Aim slightly above center so it looks like "docking"
          targetPoint.set(num, { x: r.left + r.width/2 - SIZE/2, y: r.top + r.height/2 - SIZE/2 });
        });
      });

      setBadge("Космонавты очень медленно летят в группы...");
      assigned = true;

      // send everyone to target over long duration
      const now = performance.now();
      for(const a of astronauts){
        const num = a.el.dataset.num;
        const tgt = targetPoint.get(num);
        if(!tgt) continue;

        // make them fly from current position
        a.mode = "toTarget";
        a.x0 = a.x;
        a.y0 = a.y;
        a.tx = tgt.x;
        a.ty = tgt.y;

        // VERY SLOW duration: 6–10 seconds, plus distance factor
        const dist = Math.hypot(a.tx - a.x0, a.ty - a.y0);
        a.dur = 6500 + dist * 6; // ms
        a.start = now + rand(0, 900); // little stagger
        a.el.style.opacity = "1";
      }

      // when mostly arrived -> badge
      setTimeout(()=>setBadge("Готово ✅"), 9500);
    }

    function resetAll(){
      createGroupsUI(parseInt(groupsCountSelect.value,10));
      spawnAstronauts();
    }

    btnSplit.addEventListener("click", splitIntoGroups);
    btnShuffle.addEventListener("click", shuffleAstronauts);
    btnReset.addEventListener("click", resetAll);

    groupsCountSelect.addEventListener("change", ()=>{
      createGroupsUI(parseInt(groupsCountSelect.value,10));
      setBadge("Готово");
    });

    // keep within bounds on resize
    let resizeTimer=null;
    window.addEventListener("resize", ()=>{
      clearTimeout(resizeTimer);
      resizeTimer=setTimeout(()=>{
        if(!assigned){
          // gently clamp positions to new bounds
          const b = viewportBounds();
          for(const a of astronauts){
            a.x = clamp(a.x, b.minX, b.maxX);
            a.y = clamp(a.y, b.minY, b.maxY);
          }
        }
      },180);
    });

    // init
    createGroupsUI(parseInt(groupsCountSelect.value,10));
    setTimeout(spawnAstronauts, 60);
  </script>
</body>
</html>
