<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест: Алгоритм ветвления</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Comic Sans MS", Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.5) 0 12px, transparent 13px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.35) 0 18px, transparent 19px),
        linear-gradient(180deg, #70d6ff, #0096c7);
      color: #2b2b2b;
      overflow-x: hidden;
    }

    .bubbles span {
      position: fixed;
      bottom: -80px;
      width: 35px;
      height: 35px;
      border: 3px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: bubble 10s infinite ease-in;
      z-index: 0;
    }

    .bubbles span:nth-child(1) { left: 10%; animation-delay: 0s; }
    .bubbles span:nth-child(2) { left: 30%; animation-delay: 2s; width: 50px; height: 50px; }
    .bubbles span:nth-child(3) { left: 55%; animation-delay: 4s; }
    .bubbles span:nth-child(4) { left: 75%; animation-delay: 1s; width: 60px; height: 60px; }
    .bubbles span:nth-child(5) { left: 90%; animation-delay: 3s; }

    @keyframes bubble {
      from { transform: translateY(0); opacity: 0.8; }
      to { transform: translateY(-110vh); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 950px;
      margin: 30px auto;
      padding: 20px;
    }

    .header {
      background: #ffdd00;
      border: 6px solid #7a4b00;
      border-radius: 30px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 8px 0 #7a4b00;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      color: #7a4b00;
      text-shadow: 2px 2px #fff;
    }

    .subtitle {
      font-size: 20px;
      margin-top: 10px;
      font-weight: bold;
    }

    .question {
      margin-top: 25px;
      background: #fff7b2;
      border: 5px solid #7a4b00;
      border-radius: 25px;
      padding: 22px;
      box-shadow: 0 7px 0 #7a4b00;
    }

    .question h2 {
      margin-top: 0;
      color: #0066a2;
    }

    pre {
      background: #1f2937;
      color: #f8fafc;
      padding: 15px;
      border-radius: 15px;
      overflow-x: auto;
      font-family: Consolas, monospace;
      font-size: 16px;
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 15px;
    }

    button {
      padding: 14px;
      border: 4px solid #7a4b00;
      border-radius: 20px;
      background: #fffb8f;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.04) rotate(-1deg);
      background: #ffdd00;
    }

    button.correct {
      background: #4ade80;
    }

    button.wrong {
      background: #fb7185;
    }

    .result {
      display: none;
      text-align: center;
      margin-top: 30px;
      background: #ffdd00;
      border: 6px solid #7a4b00;
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 8px 0 #7a4b00;
    }

    .result h2 {
      font-size: 34px;
      color: #7a4b00;
    }

    .restart {
      margin-top: 15px;
      background: #70e000;
    }

    .decoration {
      text-align: center;
      font-size: 48px;
      margin: 20px 0;
    }
  </style>
</head>

<body>

  <div class="bubbles">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="container">
    <div class="header">
      <h1>🍍 Тест по теме «Алгоритм ветвления»</h1>
      <div class="subtitle">7 класс | Проверь, не заблудился ли ты в Бикини Боттом</div>
    </div>

    <div class="decoration">🧽 ⭐ 🦀 🐙 🍍</div>

    <div id="quiz"></div>

    <div class="result" id="result">
      <h2>Результат</h2>
      <p id="scoreText"></p>
      <button class="restart" onclick="restartQuiz()">Пройти ещё раз</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        text: "1. Для чего используется команда if?",
        answers: ["A) Для повторения действий", "B) Для проверки условия", "C) Для вывода текста", "D) Для рисования фигур"],
        correct: 1
      },
      {
        text: "2. Что произойдет, если условие в if истинно?",
        answers: ["A) Программа завершится", "B) Выполнится код внутри if", "C) Выполнится else", "D) Ничего не произойдет"],
        correct: 1
      },
      {
        text: "3. Какая команда выполняется, если условие ложно?",
        answers: ["A) print", "B) while", "C) else", "D) input"],
        correct: 2
      },
      {
        text: "4. Какой оператор означает «И»?",
        answers: ["A) or", "B) and", "C) if", "D) else"],
        correct: 1
      },
      {
        text: "5. Какой оператор означает «ИЛИ»?",
        answers: ["A) if", "B) else", "C) and", "D) or"],
        correct: 3
      },
      {
        text: "6. Что выведет программа?",
        code: `x = 7

if x > 5:
    print("Да")
else:
    print("Нет")`,
        answers: ["A) Нет", "B) Ошибка", "C) Да", "D) Ничего"],
        correct: 2
      },
      {
        text: "7. Что выведет программа?",
        code: `x = 3

if x > 5:
    print("Большое")
else:
    print("Маленькое")`,
        answers: ["A) Большое", "B) Маленькое", "C) Ошибка", "D) 3"],
        correct: 1
      },
      {
        text: "8. Какой знак означает «не равно»?",
        answers: ["A) =", "B) ==", "C) !=", "D) >="],
        correct: 2
      },
      {
        text: "9. Что проверяет условие?",
        code: `x >= 10`,
        answers: ["A) x меньше 10", "B) x больше или равно 10", "C) x равно 10", "D) x не равно 10"],
        correct: 1
      },
      {
        text: "10. Что выведет программа?",
        code: `x = 8

if x > 5 and x < 10:
    print("Подходит")`,
        answers: ["A) Подходит", "B) Ошибка", "C) Ничего", "D) 8"],
        correct: 0
      },
      {
        text: "11. Что выведет программа?",
        code: `x = 2

if x > 5 or x == 2:
    print("Верно")`,
        answers: ["A) Неверно", "B) Ошибка", "C) Верно", "D) Ничего"],
        correct: 2
      },
      {
        text: "12. Какой результат будет у условия?",
        code: `5 > 8`,
        answers: ["A) True", "B) False", "C) 5", "D) 8"],
        correct: 1
      },
      {
        text: "13. Что выведет программа?",
        code: `x = 4

if x % 2 == 0:
    print("Четное")
else:
    print("Нечетное")`,
        answers: ["A) Нечетное", "B) Четное", "C) Ошибка", "D) 4"],
        correct: 1
      },
      {
        text: "14. Как правильно записать условие «x равно 10»?",
        answers: ["A) x = 10", "B) x == 10", "C) x != 10", "D) x >= 10"],
        correct: 1
      },
      {
        text: "15. Что выведет программа?",
        code: `x = 9

if x < 5:
    print("A")
else:
    print("B")`,
        answers: ["A) A", "B) B", "C) Ошибка", "D) Ничего"],
        correct: 1
      }
    ];

    let score = 0;
    let answered = 0;

    const quiz = document.getElementById("quiz");

    function loadQuiz() {
      quiz.innerHTML = "";
      score = 0;
      answered = 0;
      document.getElementById("result").style.display = "none";

      questions.forEach((q, index) => {
        const block = document.createElement("div");
        block.className = "question";

        let html = `<h2>${q.text}</h2>`;

        if (q.code) {
          html += `<pre>${q.code}</pre>`;
        }

        html += `<div class="answers">`;

        q.answers.forEach((answer, i) => {
          html += `<button onclick="checkAnswer(this, ${index}, ${i})">${answer}</button>`;
        });

        html += `</div>`;
        block.innerHTML = html;
        quiz.appendChild(block);
      });
    }

    function checkAnswer(button, questionIndex, answerIndex) {
      const buttons = button.parentElement.querySelectorAll("button");

      buttons.forEach(btn => {
        btn.disabled = true;
      });

      if (answerIndex === questions[questionIndex].correct) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("wrong");
        buttons[questions[questionIndex].correct].classList.add("correct");
      }

      answered++;

      if (answered === questions.length) {
        showResult();
      }
    }

    function showResult() {
      const result = document.getElementById("result");
      const scoreText = document.getElementById("scoreText");

      let comment = "";

      if (score === 15) {
        comment = "Идеально! Сквидвард даже перестал грустить.";
      } else if (score >= 12) {
        comment = "Отлично! Почти как секретная формула крабсбургера.";
      } else if (score >= 8) {
        comment = "Неплохо, но планктон где-то украл пару баллов.";
      } else {
        comment = "Нужно повторить тему. Губка Боб верит в тебя!";
      }

      scoreText.innerHTML = `Ты набрал <b>${score}</b> из <b>${questions.length}</b><br><br>${comment}`;
      result.style.display = "block";
      result.scrollIntoView({ behavior: "smooth" });
    }

    function restartQuiz() {
      loadQuiz();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    loadQuiz();
  </script>

</body>
</html>
